<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Assistant - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(100, 116, 139, 0.3);
            padding: 1rem 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-radius: 1.25rem 0.25rem 1.25rem 1.25rem;
        }

        .message.assistant .message-content {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            color: #e2e8f0;
            border-radius: 0.25rem 1.25rem 1.25rem 1.25rem;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.25rem;
            padding: 0 1rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 0.5rem;
        }

        .badge.cached {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.5);
        }

        .badge.fresh {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .sources {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(100, 116, 139, 0.2);
        }

        .sources-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .source-item {
            font-size: 0.85rem;
            padding: 0.5rem;
            background: rgba(71, 85, 105, 0.2);
            border-radius: 0.375rem;
            border-left: 2px solid #3b82f6;
            color: #cbd5e1;
            margin: 0.25rem 0;
        }

        .typing-indicator {
            display: flex;
            gap: 0.4rem;
            padding: 1rem;
        }

        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: #64748b;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-0.5rem);
            }
        }

        .input-area {
            border-top: 1px solid rgba(100, 116, 139, 0.3);
            background: rgba(15, 23, 42, 0.8);
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
        }

        .input-form {
            display: flex;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .input-field {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.95);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .send-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(148, 163, 184, 0.3);
            border-color: rgba(148, 163, 184, 0.5);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
        }

        .welcome {
            text-align: center;
            padding: 2rem;
            opacity: 0.6;
        }

        .welcome h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: center;
            font-size: 0.85rem;
        }

        .stat-item {
            color: #94a3b8;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.7);
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 90%;
            }

            .header {
                padding: 1rem;
            }

            .input-area {
                padding: 1rem;
            }

            .input-form {
                flex-wrap: wrap;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Enterprise AI Assistant</h1>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome">
                <h2>Welcome to AI Assistant</h2>
                <p>Ask me anything! Your questions are stored and searchable.</p>
                <div class="stats">
                    <span class="stat-item">✓ Powered by Elasticsearch</span>
                    <span class="stat-item">✓ Intelligent Caching</span>
                    <span class="stat-item">✓ Query History</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <button class="clear-btn" onclick="clearChat()">Clear History</button>
                <button class="clear-btn" onclick="showStats()">View Stats</button>
            </div>
            <form class="input-form" onsubmit="sendMessage(event)">
                <input 
                    type="text" 
                    class="input-field" 
                    id="messageInput" 
                    placeholder="Ask me anything... (e.g., Who is Prime Minister of India?)" 
                    autocomplete="off"
                >
                <button type="submit" class="send-btn" id="sendBtn">
                    <span>Send</span>
                    <span>→</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let messageCount = 0;
        let cachedCount = 0;

        async function sendMessage(event) {
            event.preventDefault();

            const query = messageInput.value.trim();
            if (!query) return;

            // Add user message
            addMessage(query, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            const typingId = addTypingIndicator();

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        use_cache: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Remove typing indicator
                removeTypingIndicator(typingId);

                // Add assistant message
                addMessage(data, 'assistant');
                messageCount++;
                if (data.cached) cachedCount++;

            } catch (error) {
                removeTypingIndicator(typingId);
                addErrorMessage(`Error: ${error.message}`);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(content, role) {
            if (chatContainer.querySelector('.welcome')) {
                chatContainer.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            if (role === 'user') {
                messageDiv.innerHTML = `
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
            } else {
                const badge = content.cached 
                    ? '<span class="badge cached">⚡ CACHED</span>'
                    : '<span class="badge fresh">✨ FRESH</span>';

                const sourcesHtml = content.sources && content.sources.length > 0
                    ? `
                        <div class="sources">
                            <div class="sources-label">Sources</div>
                            ${content.sources.map(source => `
                                <div class="source-item">${escapeHtml(source)}</div>
                            `).join('')}
                        </div>
                    `
                    : '';

                messageDiv.innerHTML = `
                    <div class="message-content">
                        <div>${escapeHtml(content.answer)}</div>
                        <div class="message-meta">
                            ${badge}
                            <span style="margin-left: 0.5rem;">ID: ${content.id ? content.id.substring(0, 8) + '...' : 'N/A'}</span>
                        </div>
                        ${sourcesHtml}
                    </div>
                `;
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = id;
            messageDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function addErrorMessage(error) {
            if (chatContainer.querySelector('.welcome')) {
                chatContainer.innerHTML = '';
            }

            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = error;

            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function clearChat() {
            if (confirm('Clear chat history? This only clears the UI, not the Elasticsearch database.')) {
                chatContainer.innerHTML = `
                    <div class="welcome">
                        <h2>Welcome to AI Assistant</h2>
                        <p>Ask me anything! Your questions are stored and searchable.</p>
                        <div class="stats">
                            <span class="stat-item">✓ Powered by Elasticsearch</span>
                            <span class="stat-item">✓ Intelligent Caching</span>
                            <span class="stat-item">✓ Query History</span>
                        </div>
                    </div>
                `;
                messageCount = 0;
                cachedCount = 0;
            }
        }

        async function showStats() {
            try {
                const response = await fetch('/api/all-queries?limit=1000');
                const data = await response.json();

                const total = data.total;
                const cached = messageCount > 0 ? cachedCount : 0;
                const cacheRate = messageCount > 0 ? ((cached / messageCount) * 100).toFixed(1) : 0;

                alert(`📊 Statistics\n\nTotal Stored Queries: ${total}\nCurrent Session:\n  - Messages: ${messageCount}\n  - Cached: ${cachedCount}\n  - Cache Rate: ${cacheRate}%`);
            } catch (error) {
                alert('Could not fetch statistics: ' + error.message);
            }
        }

        // Focus on input when page loads
        window.addEventListener('load', () => {
            messageInput.focus();
        });

        // Allow Enter to send (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(new Event('submit'));
            }
        });
    </script>
</body>
</html>
